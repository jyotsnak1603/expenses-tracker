databases:
  - name: fairshare-db
    databaseName: fairshare
    user: fairshare_user

services:
  - type: web
    name: fairshare-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fairshare-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True" # Or restrict to Vercel domain later

  - type: web
    name: fairshare-frontend
    env: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: fairshare-backend
          property: host
          # We'll prepend https:// and append /api in the React app itself
